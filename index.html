<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Road Trip</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <style>
    :root {
      --bg:    #18100a;
      --panel: #241508;
      --strip: #0e0905;
      --gold:  #c8893a;
      --cream: #f0dfc0;
      --dim:   #856848;
      --dot:   #ff7040;
      --star:  #ffe066;
      --info:  #c09a6a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Top bar ─────────────────────────────────────────────── */
    #top-bar {
      height: 50px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid #2a1a08;
    }

    #title {
      font-size: 20px;
      letter-spacing: 7px;
      color: var(--gold);
      font-weight: normal;
    }

    #subtitle {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--dim);
      font-style: italic;
      margin-left: 10px;
    }

    #status-badge {
      font-size: 12px;
      color: var(--dim);
      letter-spacing: 1px;
      text-align: right;
    }

    #day-counter {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 1px;
    }

    /* ── Main area ───────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* ── Map ─────────────────────────────────────────────────── */
    #map-area {
      flex: 1;
      min-width: 0;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* MapLibre attribution */
    .maplibregl-ctrl-attrib {
      font-size: 9px !important;
      background: rgba(10,6,3,0.7) !important;
      color: #555 !important;
    }

    .maplibregl-ctrl-attrib a { color: #666 !important; }

    /* MapLibre zoom control */
    .maplibregl-ctrl-group {
      background: var(--panel) !important;
      border: 1px solid #2a1a08 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    .maplibregl-ctrl-group button {
      background: transparent !important;
      color: var(--gold) !important;
      border-color: #2a1a08 !important;
      border-radius: 0 !important;
    }

    .maplibregl-ctrl-group button:hover {
      background: #2a1508 !important;
    }

    .maplibregl-ctrl-icon {
      filter: invert(60%) sepia(40%) saturate(500%) hue-rotate(10deg) brightness(90%);
    }

    /* Map tooltip */
    .map-tooltip {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      background: rgba(36,21,8,0.95);
      border: 1px solid #3a2008;
      color: var(--cream);
      font-family: Georgia, serif;
      font-size: 11px;
      padding: 4px 9px;
      white-space: nowrap;
    }

    #map-btns {
      position: absolute;
      top: 50px;
      left: 10px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .map-btn {
      background: rgba(36,21,8,0.92);
      color: var(--dim);
      border: 1px solid #2a1a08;
      font-family: Georgia, serif;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 5px 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .map-btn:hover { color: var(--gold); border-color: #3a2008; }
    .map-btn.active { color: var(--gold); border-color: var(--gold); }

    /* ── Side panel ──────────────────────────────────────────── */
    #side-panel {
      width: 420px;
      flex-shrink: 0;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      padding: 14px 16px 12px;
      gap: 10px;
      border-left: 1px solid #2a1a08;
    }

    #day-label {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid #2a1a08;
      padding-bottom: 8px;
      flex-shrink: 0;
    }

    #route-summary {
      font-size: 15px;
      color: var(--cream);
      line-height: 1.4;
      flex-shrink: 0;
    }

    #route-note {
      font-size: 12px;
      color: var(--info);
      font-style: italic;
      line-height: 1.5;
      flex-shrink: 0;
    }

    #stops-header {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--dim);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    #stops-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      scrollbar-width: thin;
      scrollbar-color: #2a1a08 transparent;
    }

    .stop-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .stop-line {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      width: 12px;
    }

    .stop-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .stop-dot.home        { background: var(--dot); box-shadow: 0 0 6px rgba(255,112,64,0.5); }
    .stop-dot.rest        { background: var(--dim); }
    .stop-dot.scenic      { background: var(--star); box-shadow: 0 0 5px rgba(255,224,102,0.4); }
    .stop-dot.poi         { background: var(--gold); }
    .stop-dot.threshold   { background: #a87840; box-shadow: 0 0 5px rgba(168,120,64,0.5); }
    .stop-dot.pilgrimage  { background: var(--gold); box-shadow: 0 0 7px rgba(200,137,58,0.7); }
    .stop-dot.reflection  { background: #8898b8; box-shadow: 0 0 6px rgba(136,152,184,0.4); }

    .stop-connector {
      width: 1px;
      flex: 1;
      min-height: 14px;
      background: #2a1a08;
      margin: 3px 0;
    }

    .stop-content {
      padding-bottom: 10px;
    }

    .stop-name {
      font-size: 13px;
      color: var(--cream);
      line-height: 1.3;
    }

    .stop-desc {
      font-size: 11px;
      color: var(--info);
      font-style: italic;
      margin-top: 2px;
    }

    #dist-info {
      font-size: 11px;
      color: var(--dim);
      border-top: 1px solid #2a1a08;
      padding-top: 8px;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    #nav-buttons {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      gap: 14px;
    }

    .nav-btn {
      background: var(--bg);
      color: var(--gold);
      border: 1px solid #3a2008;
      font-size: 18px;
      padding: 8px 28px;
      cursor: pointer;
      font-family: Georgia, serif;
      letter-spacing: 2px;
      transition: background 0.15s, color 0.15s;
      outline: none;
    }

    .nav-btn:hover { background: #2a1508; }
    .nav-btn:active { background: var(--gold); color: var(--bg); }

    /* ── Day strip ───────────────────────────────────────────── */
    #day-strip {
      height: 86px;
      flex-shrink: 0;
      background: var(--strip);
      display: flex;
      flex-direction: column;
      border-top: 1px solid #1a1008;
    }

    .sprocket-row {
      height: 13px;
      flex-shrink: 0;
      background-image: radial-gradient(ellipse 7px 6px at center, #000 55%, transparent 56%);
      background-size: 22px 13px;
      background-repeat: repeat-x;
      background-position: 11px 0;
    }

    #day-row {
      flex: 1;
      display: flex;
      align-items: center;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 4px;
      padding: 0 14px;
      scrollbar-width: thin;
      scrollbar-color: #1a1008 var(--strip);
    }

    #day-row::-webkit-scrollbar { height: 4px; }
    #day-row::-webkit-scrollbar-track { background: var(--strip); }
    #day-row::-webkit-scrollbar-thumb { background: #2a1808; }

    .day-chip {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 128px;
      height: 56px;
      cursor: pointer;
      border: 2px solid #1a1208;
      background: #1a1208;
      transition: border-color 0.15s;
      padding: 5px 8px;
      gap: 1px;
    }

    .day-chip:hover  { border-color: var(--dim); }
    .day-chip.active { border-color: var(--gold); background: #1f1610; }

    .all-chip {
      width: 82px;
      letter-spacing: 1px;
    }

    .all-chip .chip-num { font-size: 10px; letter-spacing: 3px; }
    .all-chip .chip-date { font-size: 9px; }

    .chip-num {
      font-size: 9px;
      color: #7a5838;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .day-chip.active .chip-num { color: var(--gold); }

    .chip-date {
      font-size: 10px;
      color: #6a4828;
    }

    .day-chip.active .chip-date { color: var(--dim); }

    .chip-route {
      font-size: 10px;
      color: #5a3c22;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 116px;
    }

    .day-chip.active .chip-route { color: var(--info); }

    /* ── Mobile ──────────────────────────────────────────────── */
    @media (max-width: 900px) {
      #main { flex-direction: column; }

      #side-panel {
        width: 100%;
        height: auto;
        max-height: 220px;
        flex-shrink: 0;
        border-left: none;
        border-top: 1px solid #2a1a08;
      }

      #day-strip { height: 74px; }

      .day-chip { width: 108px; height: 48px; }
    }
  </style>
</head>
<body>
<div id="app">

  <header id="top-bar">
    <div style="display:flex;align-items:baseline;">
      <span id="title">2026 ROAD TRIP</span>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

let currentView = -1;  // -1 = full trip overview, 0–6 = day index
let map = null;
let trackPts = [];     // [lat, lon][] per track
let allBounds = null;  // [[minLon, minLat], [maxLon, maxLat]]

const $dayLabel   = document.getElementById('day-label');
const $routeSumm  = document.getElementById('route-summary');

const $stopsList  = document.getElementById('stops-list');

const $departureLn= document.getElementById('departure-line');

/* ── Helpers ──────────────────────────────────────────────── */

function haversine(a, b) {
  const R = 3958.8;
  const dLat = (b[0] - a[0]) * Math.PI / 180;
  const dLon = (b[1] - a[1]) * Math.PI / 180;
  const s = Math.sin(dLat/2)**2 + Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(s));
}

function trackMiles(pts) {
  let d = 0;
  for (let i = 1; i < pts.length; i++) d += haversine(pts[i-1], pts[i]);
  return Math.round(d);
}

function departureStatus() {
  const now = new Date();
  const depart = new Date('2026-06-17T13:00:00');
  const end    = new Date('2026-06-24T06:00:00');
  if (now < depart) {
    const days = Math.ceil((depart - now) / 86400000);
    return { line1: `DEPARTING JUN 17`, line2: `T−${days} DAY${days !== 1 ? 'S' : ''}` };
  }
  if (now < end) {
    return { line1: 'IN PROGRESS', line2: 'JUN 17–23, 2026' };
  }
  return { line1: '7 DAYS · JUN 17–23', line2: '2026' };
}

function ptsBounds(pts) {
  const lats = pts.map(p => p[0]);
  const lons = pts.map(p => p[1]);
  return [[Math.min(...lons), Math.min(...lats)], [Math.max(...lons), Math.max(...lats)]];
}

/* ── EOC basemap dark theme config ───────────────────────── */

const mapStyleConfig = {
  styleUrl:             'https://tiles.openfreemap.org/styles/liberty',
  textColor:            '#ffffff',
  mutedText:            '#cbd8e8',
  haloColor:            '#334052',
  roadMinor:            '#2c3036',
  roadMajor:            '#2c3036',
  roadCasing:           '#494e58',
  highwayColor:         '#5a7299',
  roadRail:             '#3c4561',
  landColor:            '#424d5c',
  parkColor:            '#283a32',
  waterColor:           '#5f7481',
  buildingColor:        '#38414e',
  boundaryColor:        '#a3a0ab',
  backgroundColor:      '#424d5c',
  buildingOutlineColor: 'rgba(22,27,33,0.55)',
  surfaceOutlineColor:  'rgba(255,255,255,0.05)',
};

/* ── EOC theme transforms (verbatim from Pandemonium-Air-EOC) */

function deepClone(value) {
  return JSON.parse(JSON.stringify(value));
}

function darkenOpenFreeMapStyle(style) {
  const darkStyle = deepClone(style);
  darkStyle.name = 'Road Trip Dark';

  const LABEL_TEXT_SIZE_OVERRIDES = {
    'label_city':         ['interpolate', ['exponential', 1.2], ['zoom'], 4, 13, 7, 15, 11, 20],
    'label_city_capital': ['interpolate', ['exponential', 1.2], ['zoom'], 4, 14, 7, 16, 11, 22],
    'label_town':         ['interpolate', ['exponential', 1.2], ['zoom'], 7, 14, 11, 16],
    'label_village':      ['interpolate', ['exponential', 1.2], ['zoom'], 7, 12, 11, 14],
    'label_state':        ['interpolate', ['linear'],           ['zoom'], 5, 12, 8, 16],
    'label_country_1':    ['interpolate', ['linear'],           ['zoom'], 1, 11, 4, 19],
    'label_country_2':    ['interpolate', ['linear'],           ['zoom'], 2, 11, 5, 19],
    'label_country_3':    ['interpolate', ['linear'],           ['zoom'], 3, 11, 7, 19],
  };

  darkStyle.layers = (darkStyle.layers || []).map((layer) => {
    const nextLayer = deepClone(layer);
    const layerId   = String(nextLayer.id || '').toLowerCase();
    const layerType = String(nextLayer.type || '').toLowerCase();
    const paint  = nextLayer.paint || {};
    const layout = nextLayer.layout || {};

    if (LABEL_TEXT_SIZE_OVERRIDES[layerId] != null) {
      layout['text-size'] = LABEL_TEXT_SIZE_OVERRIDES[layerId];
    }

    if (layerType === 'background') {
      paint['background-color'] = mapStyleConfig.backgroundColor;
    }

    if (layerType === 'fill') {
      if (layerId.includes('water')) paint['fill-color'] = mapStyleConfig.waterColor;
      else if (/(park|forest|wood|grass|golf|pitch|cemetery|green)/.test(layerId)) {
        paint['fill-color'] = mapStyleConfig.parkColor || '#344a45';
        paint['fill-opacity'] = ['interpolate', ['linear'], ['zoom'], 0, 0.22, 7, 0.3, 12, 0.36];
      }
      else if (/(building|house)/.test(layerId)) paint['fill-color'] = mapStyleConfig.buildingColor;
      else if (/(landuse|landcover|residential|industrial|commercial|aeroway)/.test(layerId)) paint['fill-color'] = mapStyleConfig.landColor;
    }

    if (layerType === 'fill-extrusion' && /(building|house)/.test(layerId)) {
      paint['fill-extrusion-color'] = mapStyleConfig.buildingColor;
      if (paint['fill-extrusion-base'] == null) paint['fill-extrusion-base'] = 0;
    }

    if (layerType === 'line') {
      const isCasingLayer = layerId.includes('casing') || layerId.includes('outline');
      if (isCasingLayer && mapStyleConfig.roadCasing) {
        paint['line-color'] = mapStyleConfig.roadCasing;
      }
      else if (/(motorway|trunk|primary|major|highway)/.test(layerId)) paint['line-color'] = mapStyleConfig.roadMajor;
      else if (/(rail|transit)/.test(layerId)) paint['line-color'] = mapStyleConfig.roadRail;
      else if (/(water|river|stream)/.test(layerId)) paint['line-color'] = mapStyleConfig.waterColor;
      else if (/(boundary|border)/.test(layerId)) paint['line-color'] = mapStyleConfig.boundaryColor;
      else if (/(road|street|transport)/.test(layerId)) paint['line-color'] = mapStyleConfig.roadMinor;
      const sourceLayer = String(nextLayer['source-layer'] || '').toLowerCase();
      if (layerId.includes('park_outline') || sourceLayer === 'park') {
        layout.visibility = 'none';
      }
    }

    if (layerType === 'symbol') {
      if (paint['text-color'] != null) {
        paint['text-color'] = /(poi|housenumber|address|minor)/.test(layerId)
          ? mapStyleConfig.mutedText
          : mapStyleConfig.textColor;
      }
      if (paint['text-halo-color'] != null) paint['text-halo-color'] = mapStyleConfig.haloColor;
      if (paint['icon-color']  != null) paint['icon-color']  = mapStyleConfig.mutedText;
      if (/(poi|business|shop)/.test(layerId) && layout['text-size'] == null) layout['text-size'] = 11;
    }

    if (paint['fill-outline-color'] != null && /(building|landuse|park|water)/.test(layerId)) {
      paint['fill-outline-color'] = /(building|house)/.test(layerId)
        ? mapStyleConfig.buildingOutlineColor
        : mapStyleConfig.surfaceOutlineColor;
    }
    if (paint['fill-extrusion-outline-color'] != null && /(building|house)/.test(layerId)) {
      paint['fill-extrusion-outline-color'] = mapStyleConfig.buildingOutlineColor;
    }

    nextLayer.paint  = paint;
    nextLayer.layout = layout;
    return nextLayer;
  });
  return darkStyle;
}

function applyRasterLowZoomTuning(style) {
  style.layers = (style.layers || []).map((layer) => {
    const nextLayer = deepClone(layer);
    const layerId   = String(nextLayer.id || '').toLowerCase();
    const layerType = String(nextLayer.type || '').toLowerCase();
    if (layerType !== 'raster') return nextLayer;
    const paint = nextLayer.paint || {};
    paint['raster-saturation']       = -0.9;
    paint['raster-contrast']         = 0.18;
    paint['raster-brightness-min']   = 0.04;
    paint['raster-brightness-max']   = 0.34;
    if (layerId.includes('natural_earth')) {
      paint['raster-opacity'] = ['interpolate', ['exponential', 1.5], ['zoom'], 0, 0.26, 6, 0.04];
    }
    nextLayer.paint = paint;
    return nextLayer;
  });
  return style;
}

function configuredHighwayColor() {
  return String(mapStyleConfig.highwayColor || mapStyleConfig.roadMajor || '').trim();
}

function applyHighwayClassColor(style) {
  const highwayColor = configuredHighwayColor();
  if (!highwayColor) return style;
  style.layers = (style.layers || []).map((layer) => {
    const nextLayer = deepClone(layer);
    const paint     = nextLayer.paint || {};
    const layerId   = String(nextLayer.id || '').toLowerCase();
    if (
      String(nextLayer.type || '').toLowerCase() !== 'line' ||
      String(nextLayer['source-layer'] || '').toLowerCase() !== 'transportation' ||
      paint['line-color'] == null ||
      layerId.includes('casing') ||
      layerId.includes('outline')
    ) {
      return nextLayer;
    }
    const originalLineColor = paint['line-color'];
    paint['line-color'] = [
      'match', ['get', 'class'],
      'motorway',      highwayColor,
      'motorway_link', highwayColor,
      'trunk',         highwayColor,
      'trunk_link',    highwayColor,
      'primary',       highwayColor,
      'primary_link',  highwayColor,
      originalLineColor,
    ];
    nextLayer.paint = paint;
    return nextLayer;
  });
  return style;
}

function layerContainsRoadClass(layer, classes) {
  const classList = Array.isArray(classes) ? classes.map(v => String(v).toLowerCase()) : [];
  if (!classList.length) return false;
  const layerId = String(layer && layer.id ? layer.id : '').toLowerCase();
  if (classList.some(c => layerId.includes(c))) return true;
  const filterText = JSON.stringify(layer && layer.filter ? layer.filter : '').toLowerCase();
  return classList.some(c => filterText.includes(`"${c}"`));
}

function extendSmallRoadVisibility(style) {
  style.layers = (style.layers || []).map((layer) => {
    const nextLayer  = deepClone(layer);
    const layerType  = String(nextLayer.type || '').toLowerCase();
    const sourceLayer = String(nextLayer['source-layer'] || '').toLowerCase();
    if (layerType !== 'line' || sourceLayer !== 'transportation') return nextLayer;
    const paint = nextLayer.paint || {};
    const hasRoadPaint = paint['line-color'] != null || paint['line-width'] != null;
    if (!hasRoadPaint) return nextLayer;
    const layerId = String(nextLayer.id || '').toLowerCase();
    const isCasing = layerId.includes('casing');
    const isSecondaryTertiary = layerContainsRoadClass(nextLayer, ['secondary', 'secondary_link', 'tertiary', 'tertiary_link']);
    const isMinor = layerContainsRoadClass(nextLayer, ['minor', 'residential', 'living_street', 'unclassified']) || layerId.includes('road_minor');
    if (!isSecondaryTertiary && !isMinor) return nextLayer;
    if (isSecondaryTertiary) {
      if (typeof nextLayer.minzoom === 'number' && nextLayer.minzoom > 8) nextLayer.minzoom = 8;
      paint['line-width'] = ['interpolate', ['exponential', 1.18], ['zoom'],
        7.8, 0,
        8.6, isCasing ? 0.34 : 0.24,
        10,  isCasing ? 0.82 : 0.58,
        12,  isCasing ? 1.4  : 1.06,
        20,  isCasing ? 14   : 13,
      ];
      if (paint['line-opacity'] != null) {
        paint['line-opacity'] = ['interpolate', ['linear'], ['zoom'], 7.8, 0.3, 10, 0.74, 12, 0.9, 14, 1];
      }
    }
    if (isMinor) {
      if (typeof nextLayer.minzoom === 'number' && nextLayer.minzoom > 11) nextLayer.minzoom = 11;
      paint['line-width'] = ['interpolate', ['exponential', 1.18], ['zoom'],
        10.6, 0,
        11.2, isCasing ? 0.24 : 0.16,
        12.2, isCasing ? 0.42 : 0.3,
        14,   isCasing ? 2.8  : 2.5,
        20,   isCasing ? 19   : 18,
      ];
      if (paint['line-opacity'] != null) {
        paint['line-opacity'] = ['interpolate', ['linear'], ['zoom'], 10.6, 0.32, 12.2, 0.62, 14, 0.92, 16, 1];
      }
    }
    nextLayer.paint = paint;
    return nextLayer;
  });
  return style;
}

function extendBoundaryVisibility(style) {
  const existing = Array.isArray(style.layers) ? style.layers : [];
  const layers = existing.filter(layer => {
    const id = String(layer && layer.id ? layer.id : '');
    return id !== 'rt-boundary-state' && id !== 'rt-boundary-county';
  });
  const borderColor = String(mapStyleConfig.boundaryColor || '#a3a0ab').trim();
  const tunedLayers = layers.map(layer => {
    const nextLayer = deepClone(layer);
    const id = String(nextLayer && nextLayer.id ? nextLayer.id : '');
    if (id === 'boundary_2' || id === 'boundary_3' || id === 'boundary_disputed') {
      const layout = nextLayer.layout || {};
      layout.visibility = 'none';
      nextLayer.layout = layout;
    }
    return nextLayer;
  });
  const insertIndex = (() => {
    const idx = tunedLayers.findIndex(l => {
      const id = String(l && l.id ? l.id : '');
      return id.startsWith('boundary_') || id === 'boundary_disputed';
    });
    return idx >= 0 ? idx : tunedLayers.length;
  })();
  const stateLayer = {
    id: 'rt-boundary-state',
    type: 'line',
    source: 'openmaptiles',
    'source-layer': 'boundary',
    minzoom: 0,
    filter: ['all', ['==', ['get', 'admin_level'], 4], ['!=', ['get', 'maritime'], 1], ['!=', ['get', 'disputed'], 1], ['!', ['has', 'claimed_by']]],
    layout: { 'line-cap': 'round', 'line-join': 'round' },
    paint: {
      'line-color': borderColor,
      'line-opacity': 0.9,
      'line-width': ['interpolate', ['linear'], ['zoom'], 0, 0.55, 3, 0.68, 6, 0.82, 10, 1.02, 14, 1.28, 18, 1.62],
    },
  };
  const countyLayer = {
    id: 'rt-boundary-county',
    type: 'line',
    source: 'openmaptiles',
    'source-layer': 'boundary',
    minzoom: 0,
    filter: ['all',
      ['any', ['==', ['get', 'admin_level'], 2], ['==', ['get', 'admin_level'], 3], ['==', ['get', 'admin_level'], 4], ['==', ['get', 'admin_level'], 5], ['==', ['get', 'admin_level'], 6]],
      ['!=', ['get', 'maritime'], 1], ['!=', ['get', 'disputed'], 1], ['!', ['has', 'claimed_by']],
    ],
    layout: { 'line-cap': 'round', 'line-join': 'round' },
    paint: {
      'line-color': borderColor,
      'line-opacity': 0.82,
      'line-width': ['interpolate', ['linear'], ['zoom'], 0, 0.42, 3, 0.52, 6, 0.64, 10, 0.8, 14, 0.98, 18, 1.26],
    },
  };
  tunedLayers.splice(insertIndex, 0, countyLayer, stateLayer);
  style.layers = tunedLayers;
  return style;
}

/* ── Init ─────────────────────────────────────────────────── */

async function init() {
  const { line1, line2 } = departureStatus();
  $departureLn.textContent = line1;
  $dayCounter.textContent  = line2;

  const gpxText = await fetch('The_2026_Reset_Trip.gpx').then(r => r.text());
  const doc = new DOMParser().parseFromString(gpxText, 'text/xml');

  const tracks = [...doc.querySelectorAll('trk')].map(trk => ({
    name: trk.querySelector('name')?.textContent || '',
    pts: [...trk.querySelectorAll('trkpt')].map(pt => [
      parseFloat(pt.getAttribute('lat')),
      parseFloat(pt.getAttribute('lon')),
    ]),
  }));

  const wpts = [...doc.querySelectorAll('wpt')].map(w => ({
    lat: parseFloat(w.getAttribute('lat')),
    lon: parseFloat(w.getAttribute('lon')),
    name: w.querySelector('name')?.textContent || w.querySelector('cmt')?.textContent || '',
    sym:  w.querySelector('sym')?.textContent || '',
  }));

  await initMap(tracks, wpts);
  buildDayStrip();
  selectView(-1, false);
}

/* ── Map ──────────────────────────────────────────────────── */

async function initMap(tracks, wpts) {
  // Fetch liberty style and apply EOC dark transforms
  const baseStyle = await fetch('https://tiles.openfreemap.org/styles/liberty').then(r => r.json());
  let style = darkenOpenFreeMapStyle(baseStyle);
  style = applyRasterLowZoomTuning(style);
  style = applyHighwayClassColor(style);
  style = extendSmallRoadVisibility(style);
  style = extendBoundaryVisibility(style);

  // Store pts for bounds/distance calculations
  trackPts = tracks.map(t => t.pts);
  const allPts = tracks.flatMap(t => t.pts);
  if (allPts.length) {
    allBounds = ptsBounds(allPts);
  }

  const center = allBounds
    ? [(allBounds[0][0] + allBounds[1][0]) / 2, (allBounds[0][1] + allBounds[1][1]) / 2]
    : [-96, 37.5];

  return new Promise((resolve) => {
    map = new maplibregl.Map({
      container: 'map',
      style,
      center,
      zoom: 4,
      attributionControl: true,
    });

    map.on('error', (e) => console.warn('[map]', e && e.error));

    map.on('load', () => {
      // Add one GeoJSON source + line layer per track (one per day)
      tracks.forEach((trk, i) => {
        map.addSource(`track-${i}`, {
          type: 'geojson',
          data: {
            type: 'Feature',
            geometry: {
              type: 'LineString',
              coordinates: trk.pts.map(([lat, lon]) => [lon, lat]),
            },
          },
        });
        map.addLayer({
          id: `track-${i}`,
          type: 'line',
          source: `track-${i}`,
          layout: { 'line-cap': 'round', 'line-join': 'round' },
          paint: {
            'line-color': '#5a3a18',
            'line-width': 2,
            'line-opacity': 0.5,
          },
        });
      });

      // Shared tooltip div for waypoint hover
      const tooltipEl = document.createElement('div');
      tooltipEl.className = 'map-tooltip';
      tooltipEl.style.display = 'none';
      document.body.appendChild(tooltipEl);

      // Waypoint markers
      const seen = new Set();
      wpts.forEach(w => {
        const key = `${w.lat.toFixed(3)},${w.lon.toFixed(3)}`;
        if (seen.has(key) || !w.name) return;
        seen.add(key);

        const isHome    = w.sym === 'Flag, Blue';
        const isLodging = w.sym === 'Lodging';
        const isScenic  = w.sym === 'Scenic Area';

        let color = '#c8893a';
        if (isHome)    color = '#ff7040';
        if (isLodging) color = '#6a5035';
        if (isScenic)  color = '#ffe066';

        const sz = isHome || isScenic ? 10 : 8;
        const el = document.createElement('div');
        el.style.cssText = `width:${sz}px;height:${sz}px;background:${color};border-radius:50%;border:1.5px solid rgba(255,255,255,0.18);box-shadow:0 0 6px rgba(0,0,0,0.7);cursor:pointer;`;

        el.addEventListener('mouseenter', () => {
          tooltipEl.textContent = w.name;
          tooltipEl.style.display = 'block';
        });
        el.addEventListener('mousemove', (e) => {
          tooltipEl.style.left = (e.clientX + 14) + 'px';
          tooltipEl.style.top  = (e.clientY - 10) + 'px';
        });
        el.addEventListener('mouseleave', () => {
          tooltipEl.style.display = 'none';
        });

        new maplibregl.Marker({ element: el })
          .setLngLat([w.lon, w.lat])
          .addTo(map);
      });

      // Fit/view buttons
      document.getElementById('fit-day-btn').addEventListener('click', () => {
        if (currentView === -1) {
          if (allBounds) map.fitBounds(allBounds, { padding: 40 });
        } else {
          const pts = trackPts[currentView];
          if (pts?.length) map.fitBounds(ptsBounds(pts), { padding: 60 });
        }
      });

      document.getElementById('fit-all-btn').addEventListener('click', () => {
        if (allBounds) map.fitBounds(allBounds, { padding: 40 });
      });

      resolve();
    });
  });
}

/* ── Day strip ────────────────────────────────────────────── */

function buildDayStrip() {
  $dayRow.innerHTML = '';

  const allChip = document.createElement('div');
  allChip.className = 'day-chip all-chip';
  allChip.dataset.view = 'all';
  allChip.innerHTML = `
    <span class="chip-num">ALL</span>
    <span class="chip-date">JUN 17–23</span>
  `;
  allChip.addEventListener('click', () => selectView(-1, true));
  $dayRow.appendChild(allChip);

  DAYS.forEach((d, i) => {
    const parts = d.label.split('·');
    const chip = document.createElement('div');
    chip.className = 'day-chip';
    chip.dataset.index = i;
    chip.innerHTML = `
      <span class="chip-num">${(parts[0] || '').trim()}</span>
      <span class="chip-date">${(parts[1] || '').trim()}</span>
      <span class="chip-route">${d.from.split(',')[0]} → ${d.to.split(',')[0]}</span>
    `;
    chip.addEventListener('click', () => selectView(i, true));
    $dayRow.appendChild(chip);
  });
}

/* ── Select view ──────────────────────────────────────────── */

function renderStops(stops) {
  $stopsList.innerHTML = '';
  stops.forEach((stop, idx) => {
    const isLast = idx === stops.length - 1;
    const row = document.createElement('div');
    row.className = 'stop-item';
    row.innerHTML = `
      <div class="stop-line">
        <div class="stop-dot ${stop.type}"></div>
        ${!isLast ? '<div class="stop-connector"></div>' : ''}
      </div>
      <div class="stop-content">
        <div class="stop-name">${stop.name}</div>
        ${stop.desc ? `<div class="stop-desc">${stop.desc}</div>` : ''}
      </div>
    `;
    $stopsList.appendChild(row);
  });
}

function selectView(index, fitMap) {
  currentView = Math.max(-1, Math.min(index, DAYS.length - 1));
  const chips = $dayRow.querySelectorAll('.day-chip');

  if (currentView === -1) {
    // ── Full trip overview ──────────────────────────────────
    if (map) {
      trackPts.forEach((_, i) => {
        map.setPaintProperty(`track-${i}`, 'line-color', '#c8893a');
        map.setPaintProperty(`track-${i}`, 'line-width', 2.5);
        map.setPaintProperty(`track-${i}`, 'line-opacity', 0.72);
      });
      if (fitMap && allBounds) map.fitBounds(allBounds, { padding: 40 });
    }

    $dayCounter.textContent = 'ALL 7 DAYS';

    $dayLabel.textContent = TRIP_OVERVIEW.label;

    $routeSumm.innerHTML =
      `<span style="color:var(--cream)">Charlottesville, VA</span>` +
      `<span style="color:var(--dim)"> → </span>` +
      `<span style="color:var(--cream)">Independence, CA</span>` +
      `<span style="color:var(--dim)"> → </span>` +
      `<span style="color:var(--cream)">Charlottesville, VA</span>`;

    $routeNote.textContent = TRIP_OVERVIEW.note;

    renderStops(TRIP_OVERVIEW.stops);

    const total = trackPts.reduce((sum, pts) =>
      sum + (pts?.length > 1 ? trackMiles(pts) : 0), 0);
    $distInfo.textContent = total > 0 ? `~${total.toLocaleString()} mi total` : '';

    chips.forEach((el, i) => el.classList.toggle('active', i === 0));
    chips[0]?.scrollIntoView({ inline: 'nearest', block: 'nearest' });

  } else {
    // ── Single day ─────────────────────────────────────────
    const day = DAYS[currentView];

    if (map) {
      trackPts.forEach((_, i) => {
        const active = i === currentView;
        map.setPaintProperty(`track-${i}`, 'line-color',   active ? '#c8893a' : '#5a3a18');
        map.setPaintProperty(`track-${i}`, 'line-width',   active ? 3.5 : 1.5);
        map.setPaintProperty(`track-${i}`, 'line-opacity', active ? 0.92 : 0.35);
        if (active) map.moveLayer(`track-${i}`);
      });
      if (fitMap) {
        const pts = trackPts[currentView];
        if (pts?.length) map.fitBounds(ptsBounds(pts), { padding: 80 });
      }
    }

    $dayCounter.textContent = `DAY ${currentView + 1} OF 7`;

    $dayLabel.textContent = day.label;

    $routeSumm.innerHTML =
      `<span style="color:var(--cream)">${day.from}</span>` +
      `<span style="color:var(--dim)"> → </span>` +
      `<span style="color:var(--cream)">${day.to}</span>`;

    $routeNote.textContent = day.note;

    renderStops(day.stops);

    const pts = trackPts[currentView];
    $distInfo.textContent = pts?.length > 1 ? `~${trackMiles(pts).toLocaleString()} mi` : '';

    // chips[0] = ALL chip, chips[1–7] = days
    chips.forEach((el, i) => el.classList.toggle('active', i === currentView + 1));
    const activeChip = chips[currentView + 1];
    if (activeChip) {
      $dayRow.scrollLeft = activeChip.offsetLeft - ($dayRow.clientWidth / 2) + (activeChip.offsetWidth / 2);
    }
  }
}

/* ── Keyboard ─────────────────────────────────────────────── */

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    selectView(currentView + 1, true);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    selectView(currentView - 1, true);
  } else if (e.key === 'Home') {
    e.preventDefault();
    selectView(-1, true);
  } else if (e.key === 'End') {
    e.preventDefault();
    selectView(DAYS.length - 1, true);
  }
});

document.getElementById('btn-prev').addEventListener('click', () => selectView(currentView - 1, true));
document.getElementById('btn-next').addEventListener('click', () => selectView(currentView + 1, true));

/* ── Boot ─────────────────────────────────────────────────── */

init().catch(err => {
  document.body.innerHTML = `<div style="color:#c8893a;padding:40px;font-family:Georgia;font-size:16px;">
    Failed to load: ${err.message}<br><br>
    Open this file through a local server, e.g.<br>
    <code>python -m http.server 8080</code><br>
    then visit <code>http://localhost:8080</code>
  </div>`;
});
</script>
