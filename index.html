<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Road Trip</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg:    #18100a;
      --panel: #241508;
      --strip: #0e0905;
      --gold:  #c8893a;
      --cream: #f0dfc0;
      --dim:   #856848;
      --dot:   #ff7040;
      --star:  #ffe066;
      --info:  #c09a6a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Top bar ─────────────────────────────────────────────── */
    #top-bar {
      height: 50px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid #2a1a08;
    }

    #title {
      font-size: 20px;
      letter-spacing: 7px;
      color: var(--gold);
      font-weight: normal;
    }

    #subtitle {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--dim);
      font-style: italic;
      margin-left: 10px;
    }

    #status-badge {
      font-size: 12px;
      color: var(--dim);
      letter-spacing: 1px;
      text-align: right;
    }

    #day-counter {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 1px;
    }

    /* ── Main area ───────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* ── Map ─────────────────────────────────────────────────── */
    #map-area {
      flex: 1;
      min-width: 0;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .leaflet-tile-pane {
      filter: brightness(0.75) saturate(0.6);
    }

    .leaflet-control-attribution {
      font-size: 9px !important;
      background: rgba(10,6,3,0.7) !important;
      color: #555 !important;
    }

    .leaflet-control-attribution a { color: #666 !important; }

    .leaflet-control-zoom a {
      background: var(--panel) !important;
      color: var(--gold) !important;
      border-color: #2a1a08 !important;
    }

    .leaflet-control-zoom a:hover { background: #2a1508 !important; }

    #map-btns {
      position: absolute;
      top: 50px;
      left: 10px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .map-btn {
      background: rgba(36,21,8,0.92);
      color: var(--dim);
      border: 1px solid #2a1a08;
      font-family: Georgia, serif;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 5px 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .map-btn:hover { color: var(--gold); border-color: #3a2008; }
    .map-btn.active { color: var(--gold); border-color: var(--gold); }

    /* Tooltip overrides */
    .leaflet-tooltip {
      background: rgba(36,21,8,0.95) !important;
      border: 1px solid #3a2008 !important;
      color: var(--cream) !important;
      font-family: Georgia, serif !important;
      font-size: 11px !important;
      padding: 4px 9px !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    .leaflet-tooltip::before { border-right-color: #3a2008 !important; }
    .leaflet-tooltip-left::before { border-left-color: #3a2008 !important; }

    /* ── Side panel ──────────────────────────────────────────── */
    #side-panel {
      width: 420px;
      flex-shrink: 0;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      padding: 14px 16px 12px;
      gap: 10px;
      border-left: 1px solid #2a1a08;
    }

    #day-label {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid #2a1a08;
      padding-bottom: 8px;
      flex-shrink: 0;
    }

    #route-summary {
      font-size: 15px;
      color: var(--cream);
      line-height: 1.4;
      flex-shrink: 0;
    }

    #route-note {
      font-size: 12px;
      color: var(--info);
      font-style: italic;
      line-height: 1.5;
      flex-shrink: 0;
    }

    #stops-header {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--dim);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    #stops-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      scrollbar-width: thin;
      scrollbar-color: #2a1a08 transparent;
    }

    .stop-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .stop-line {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      width: 12px;
    }

    .stop-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .stop-dot.home        { background: var(--dot); box-shadow: 0 0 6px rgba(255,112,64,0.5); }
    .stop-dot.rest        { background: var(--dim); }
    .stop-dot.scenic      { background: var(--star); box-shadow: 0 0 5px rgba(255,224,102,0.4); }
    .stop-dot.poi         { background: var(--gold); }
    .stop-dot.threshold   { background: #a87840; box-shadow: 0 0 5px rgba(168,120,64,0.5); }
    .stop-dot.pilgrimage  { background: var(--gold); box-shadow: 0 0 7px rgba(200,137,58,0.7); }
    .stop-dot.reflection  { background: #8898b8; box-shadow: 0 0 6px rgba(136,152,184,0.4); }

    .stop-connector {
      width: 1px;
      flex: 1;
      min-height: 14px;
      background: #2a1a08;
      margin: 3px 0;
    }

    .stop-content {
      padding-bottom: 10px;
    }

    .stop-name {
      font-size: 13px;
      color: var(--cream);
      line-height: 1.3;
    }

    .stop-desc {
      font-size: 11px;
      color: var(--info);
      font-style: italic;
      margin-top: 2px;
    }

    #dist-info {
      font-size: 11px;
      color: var(--dim);
      border-top: 1px solid #2a1a08;
      padding-top: 8px;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    #nav-buttons {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      gap: 14px;
    }

    .nav-btn {
      background: var(--bg);
      color: var(--gold);
      border: 1px solid #3a2008;
      font-size: 18px;
      padding: 8px 28px;
      cursor: pointer;
      font-family: Georgia, serif;
      letter-spacing: 2px;
      transition: background 0.15s, color 0.15s;
      outline: none;
    }

    .nav-btn:hover { background: #2a1508; }
    .nav-btn:active { background: var(--gold); color: var(--bg); }

    /* ── Day strip ───────────────────────────────────────────── */
    #day-strip {
      height: 86px;
      flex-shrink: 0;
      background: var(--strip);
      display: flex;
      flex-direction: column;
      border-top: 1px solid #1a1008;
    }

    .sprocket-row {
      height: 13px;
      flex-shrink: 0;
      background-image: radial-gradient(ellipse 7px 6px at center, #000 55%, transparent 56%);
      background-size: 22px 13px;
      background-repeat: repeat-x;
      background-position: 11px 0;
    }

    #day-row {
      flex: 1;
      display: flex;
      align-items: center;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 4px;
      padding: 0 14px;
      scrollbar-width: thin;
      scrollbar-color: #1a1008 var(--strip);
    }

    #day-row::-webkit-scrollbar { height: 4px; }
    #day-row::-webkit-scrollbar-track { background: var(--strip); }
    #day-row::-webkit-scrollbar-thumb { background: #2a1808; }

    .day-chip {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 128px;
      height: 56px;
      cursor: pointer;
      border: 2px solid #1a1208;
      background: #1a1208;
      transition: border-color 0.15s;
      padding: 5px 8px;
      gap: 1px;
    }

    .day-chip:hover  { border-color: var(--dim); }
    .day-chip.active { border-color: var(--gold); background: #1f1610; }

    .all-chip {
      width: 82px;
      letter-spacing: 1px;
    }

    .all-chip .chip-num { font-size: 10px; letter-spacing: 3px; }
    .all-chip .chip-date { font-size: 9px; }

    .chip-num {
      font-size: 9px;
      color: #7a5838;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .day-chip.active .chip-num { color: var(--gold); }

    .chip-date {
      font-size: 10px;
      color: #6a4828;
    }

    .day-chip.active .chip-date { color: var(--dim); }

    .chip-route {
      font-size: 10px;
      color: #5a3c22;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 116px;
    }

    .day-chip.active .chip-route { color: var(--info); }

    /* ── Mobile ──────────────────────────────────────────────── */
    @media (max-width: 900px) {
      #main { flex-direction: column; }

      #side-panel {
        width: 100%;
        height: auto;
        max-height: 220px;
        flex-shrink: 0;
        border-left: none;
        border-top: 1px solid #2a1a08;
      }

      #day-strip { height: 74px; }

      .day-chip { width: 108px; height: 48px; }
    }
  </style>
</head>
<body>
<div id="app">

  <header id="top-bar">
    <div style="display:flex;align-items:baseline;">
      <span id="title">2026 ROAD TRIP</span>
      <span id="subtitle">· the reset trip</span>
    </div>
    <div id="status-badge">
      <div id="departure-line"></div>
      <div id="day-counter"></div>
    </div>
  </header>

  <div id="main">

    <div id="map-area">
      <div id="map"></div>
      <div id="map-btns">
        <button class="map-btn" id="fit-day-btn">fit view</button>
        <button class="map-btn" id="fit-all-btn">fit all</button>
      </div>
    </div>

    <aside id="side-panel">
      <div id="day-label"></div>
      <div id="route-summary"></div>
      <div id="route-note"></div>
      <div id="stops-header">STOPS</div>
      <div id="stops-list"></div>
      <div id="dist-info"></div>
      <div id="nav-buttons">
        <button class="nav-btn" id="btn-prev" title="Previous day (←)">◀</button>
        <button class="nav-btn" id="btn-next" title="Next day (→)">▶</button>
      </div>
    </aside>

  </div>

  <div id="day-strip">
    <div class="sprocket-row"></div>
    <div id="day-row"></div>
    <div class="sprocket-row"></div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

const DAYS = [
  {
    label: 'DAY 1 · WED JUN 17',
    from: 'Charlottesville, VA',
    to: 'Forrest City, AR',
    note: 'Trip #5. Same road, same ritual — different weight. Head west on I-64, pick up I-40 at Cookeville, push into Arkansas.',
    stops: [
      { name: 'Charlottesville, VA', desc: 'Home base · depart afternoon', type: 'home' },
      { name: 'Forrest City Rest Area', desc: 'I-40 West, AR · sleep', type: 'rest' },
    ],
  },
  {
    label: 'DAY 2 · THU JUN 18',
    from: 'Forrest City, AR',
    to: 'Gray County, TX',
    note: 'West on I-40 through Oklahoma into the Texas panhandle. The road opens up. Something shifts.',
    stops: [
      { name: 'Forrest City Rest Area', desc: 'I-40, AR · wake up', type: 'rest' },
      { name: 'Gray County Safety Rest Area', desc: 'I-40 West, TX · a known quantity · the trip becomes real here · sleep', type: 'threshold' },
    ],
  },
  {
    label: 'DAY 3 · FRI JUN 19',
    from: 'Gray County, TX',
    to: 'Millers Rest Area, NV',
    note: 'Cadillac Ranch at dawn. Then a long straight push west — New Mexico, Arizona, Nevada.',
    stops: [
      { name: 'Gray County Rest Area', desc: 'TX · wake up', type: 'rest' },
      { name: 'Cadillac Ranch', desc: 'Amarillo, TX · deliberate curiosity · Route 66', type: 'poi' },
      { name: 'Millers Rest Area', desc: 'Nevada · sleep', type: 'rest' },
    ],
  },
  {
    label: 'DAY 4 · SAT JUN 20',
    from: 'Millers, NV',
    to: 'Meteor Crater, AZ',
    note: 'The emotional core of the trip. The Sierra at its most sublime, then Manzanar on the same road the same afternoon — by design.',
    stops: [
      { name: 'Millers Rest Area', desc: 'Nevada · wake up', type: 'rest' },
      { name: 'June Lake Loop', desc: 'Eastern Sierra · just north of Mono Lake · the sublime', type: 'scenic' },
      { name: 'Independence, CA', desc: 'The turnaround · touch the wall · every time · no overnight this year', type: 'pilgrimage' },
      { name: 'Manzanar', desc: 'More than 10,000 Japanese Americans incarcerated here · not a side trip · not tourism', type: 'reflection' },
      { name: 'Meteor Crater Rest Area', desc: 'AZ · sleep', type: 'rest' },
    ],
  },
  {
    label: 'DAY 5 · SUN JUN 21',
    from: 'Meteor Crater, AZ',
    to: 'Gray County, TX',
    note: 'Monument Valley at golden hour. Then the long night run east — the trip begins folding back on itself.',
    stops: [
      { name: 'Meteor Crater Rest Area', desc: 'AZ · wake up', type: 'rest' },
      { name: 'East & West Mitten Overlook', desc: 'Monument Valley · the iconic view', type: 'scenic' },
      { name: 'Gray County Safety Rest Area', desc: 'I-40, TX · the threshold again · now heading home · sleep', type: 'threshold' },
    ],
  },
  {
    label: 'DAY 6 · MON JUN 22',
    from: 'Gray County, TX',
    to: 'Forrest City, AR',
    note: 'The mirror of Day 2. Same road, direction reversed. The western life recedes. Arkansas arrives.',
    stops: [
      { name: 'Gray County Rest Area', desc: 'TX · wake up · direction: east', type: 'rest' },
      { name: 'Forrest City Rest Area', desc: 'I-40, AR · sleep', type: 'rest' },
    ],
  },
  {
    label: 'DAY 7 · TUE JUN 23',
    from: 'Forrest City, AR',
    to: 'Charlottesville, VA',
    note: 'Final day. Nashville, the Tennessee mountains, the Shenandoah. One deliberate stop before home.',
    stops: [
      { name: 'Forrest City Rest Area', desc: 'AR · wake up', type: 'rest' },
      { name: '1897 Genesis Road, Crossville TN', desc: 'Celina 52 filming location · and it\'s on Genesis Road', type: 'poi' },
      { name: 'Charlottesville, VA', desc: 'Home · the reset complete', type: 'home' },
    ],
  },
];

const TRIP_OVERVIEW = {
  label: 'FULL TRIP · JUN 17–23',
  summary: 'Charlottesville, VA → Independence, CA → Charlottesville, VA',
  note: 'Escape → reset → witness → turnaround → return. Seven days, I-40 west and back, rest areas for beds. Same skeleton as every year. Different weight.',
  stops: [
    { name: 'Gray County, TX', desc: 'The threshold · where the trip becomes real · both ways', type: 'threshold' },
    { name: 'Cadillac Ranch', desc: 'Day 3 · Amarillo, TX · deliberate curiosity', type: 'poi' },
    { name: 'June Lake Loop', desc: 'Day 4 · Eastern Sierra · the sublime', type: 'scenic' },
    { name: 'Independence, CA', desc: 'Day 4 · the turnaround · every time', type: 'pilgrimage' },
    { name: 'Manzanar', desc: 'Day 4 · the witness stop · not tourism', type: 'reflection' },
    { name: 'East & West Mitten Overlook', desc: 'Day 5 · Monument Valley', type: 'scenic' },
    { name: '1897 Genesis Road, Crossville TN', desc: 'Day 7 · Celina 52 · and it\'s on Genesis Road', type: 'poi' },
  ],
};

let currentView = -1;  // -1 = full trip overview, 0–6 = day index
let map = null;
let allPolylines = [];
let allBounds = null;
let wptMarkers = [];

const $dayLabel   = document.getElementById('day-label');
const $routeSumm  = document.getElementById('route-summary');
const $routeNote  = document.getElementById('route-note');
const $stopsList  = document.getElementById('stops-list');
const $distInfo   = document.getElementById('dist-info');
const $dayRow     = document.getElementById('day-row');
const $dayCounter = document.getElementById('day-counter');
const $departureLn= document.getElementById('departure-line');

/* ── Helpers ──────────────────────────────────────────────── */

function haversine(a, b) {
  const R = 3958.8;
  const dLat = (b[0] - a[0]) * Math.PI / 180;
  const dLon = (b[1] - a[1]) * Math.PI / 180;
  const s = Math.sin(dLat/2)**2 + Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(s));
}

function trackMiles(pts) {
  let d = 0;
  for (let i = 1; i < pts.length; i++) d += haversine(pts[i-1], pts[i]);
  return Math.round(d);
}

function departureStatus() {
  const now = new Date();
  const depart = new Date('2026-06-17T13:00:00');
  const end    = new Date('2026-06-24T06:00:00');
  if (now < depart) {
    const days = Math.ceil((depart - now) / 86400000);
    return { line1: `DEPARTING JUN 17`, line2: `T−${days} DAY${days !== 1 ? 'S' : ''}` };
  }
  if (now < end) {
    return { line1: 'IN PROGRESS', line2: 'JUN 17–23, 2026' };
  }
  return { line1: '7 DAYS · JUN 17–23', line2: '2026' };
}

/* ── Init ─────────────────────────────────────────────────── */

async function init() {
  const { line1, line2 } = departureStatus();
  $departureLn.textContent = line1;
  $dayCounter.textContent  = line2;

  const gpxText = await fetch('The_2026_Reset_Trip.gpx').then(r => r.text());
  const doc = new DOMParser().parseFromString(gpxText, 'text/xml');

  const tracks = [...doc.querySelectorAll('trk')].map(trk => ({
    name: trk.querySelector('name')?.textContent || '',
    pts: [...trk.querySelectorAll('trkpt')].map(pt => [
      parseFloat(pt.getAttribute('lat')),
      parseFloat(pt.getAttribute('lon')),
    ]),
  }));

  const wpts = [...doc.querySelectorAll('wpt')].map(w => ({
    lat: parseFloat(w.getAttribute('lat')),
    lon: parseFloat(w.getAttribute('lon')),
    name: w.querySelector('name')?.textContent || w.querySelector('cmt')?.textContent || '',
    sym:  w.querySelector('sym')?.textContent || '',
  }));

  initMap(tracks, wpts);
  buildDayStrip();
  selectView(-1, false);
}

/* ── Map ──────────────────────────────────────────────────── */

function initMap(tracks, wpts) {
  map = L.map('map', { zoomControl: true, attributionControl: true });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://carto.com">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  const allPts = [];
  tracks.forEach((trk, i) => {
    const poly = L.polyline(trk.pts, {
      color: '#5a3a18',
      weight: 2,
      opacity: 0.5,
    }).addTo(map);
    poly._pts = trk.pts;
    allPolylines.push(poly);
    allPts.push(...trk.pts);
  });

  if (allPts.length) {
    allBounds = L.latLngBounds(allPts);
    map.fitBounds(allBounds.pad(0.06));
  } else {
    map.setView([37.5, -96], 4);
  }

  const seen = new Set();
  wpts.forEach(w => {
    const key = `${w.lat.toFixed(3)},${w.lon.toFixed(3)}`;
    if (seen.has(key) || !w.name) return;
    seen.add(key);

    const isHome    = w.sym === 'Flag, Blue';
    const isLodging = w.sym === 'Lodging';
    const isScenic  = w.sym === 'Scenic Area';

    let color = '#c8893a';
    if (isHome)    color = '#ff7040';
    if (isLodging) color = '#6a5035';
    if (isScenic)  color = '#ffe066';

    const sz  = isHome || isScenic ? 10 : 8;
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:${sz}px;height:${sz}px;background:${color};border-radius:50%;border:1.5px solid rgba(255,255,255,0.18);box-shadow:0 0 6px rgba(0,0,0,0.7);"></div>`,
      iconSize: [sz, sz],
      iconAnchor: [sz/2, sz/2],
    });

    const m = L.marker([w.lat, w.lon], { icon })
      .bindTooltip(w.name, { permanent: false, offset: [8, 0] })
      .addTo(map);
    wptMarkers.push(m);
  });

  document.getElementById('fit-day-btn').addEventListener('click', () => {
    if (currentView === -1) {
      if (allBounds) map.fitBounds(allBounds.pad(0.06));
    } else {
      const pts = allPolylines[currentView]?._pts;
      if (pts?.length) map.fitBounds(L.latLngBounds(pts).pad(0.1));
    }
  });

  document.getElementById('fit-all-btn').addEventListener('click', () => {
    if (allBounds) map.fitBounds(allBounds.pad(0.06));
  });
}

/* ── Day strip ────────────────────────────────────────────── */

function buildDayStrip() {
  $dayRow.innerHTML = '';

  const allChip = document.createElement('div');
  allChip.className = 'day-chip all-chip';
  allChip.dataset.view = 'all';
  allChip.innerHTML = `
    <span class="chip-num">ALL</span>
    <span class="chip-date">JUN 17–23</span>
  `;
  allChip.addEventListener('click', () => selectView(-1, true));
  $dayRow.appendChild(allChip);

  DAYS.forEach((d, i) => {
    const parts = d.label.split('·');
    const chip = document.createElement('div');
    chip.className = 'day-chip';
    chip.dataset.index = i;
    chip.innerHTML = `
      <span class="chip-num">${(parts[0] || '').trim()}</span>
      <span class="chip-date">${(parts[1] || '').trim()}</span>
      <span class="chip-route">${d.from.split(',')[0]} → ${d.to.split(',')[0]}</span>
    `;
    chip.addEventListener('click', () => selectView(i, true));
    $dayRow.appendChild(chip);
  });
}

/* ── Select view ──────────────────────────────────────────── */

function renderStops(stops) {
  $stopsList.innerHTML = '';
  stops.forEach((stop, idx) => {
    const isLast = idx === stops.length - 1;
    const row = document.createElement('div');
    row.className = 'stop-item';
    row.innerHTML = `
      <div class="stop-line">
        <div class="stop-dot ${stop.type}"></div>
        ${!isLast ? '<div class="stop-connector"></div>' : ''}
      </div>
      <div class="stop-content">
        <div class="stop-name">${stop.name}</div>
        ${stop.desc ? `<div class="stop-desc">${stop.desc}</div>` : ''}
      </div>
    `;
    $stopsList.appendChild(row);
  });
}

function selectView(index, fitMap) {
  currentView = Math.max(-1, Math.min(index, DAYS.length - 1));
  const chips = $dayRow.querySelectorAll('.day-chip');

  if (currentView === -1) {
    // ── Full trip overview ──────────────────────────────────
    allPolylines.forEach(poly => {
      poly.setStyle({ color: '#c8893a', weight: 2.5, opacity: 0.72 });
    });

    if (fitMap && allBounds) map.fitBounds(allBounds.pad(0.06));

    $dayCounter.textContent = 'ALL 7 DAYS';

    $dayLabel.textContent = TRIP_OVERVIEW.label;

    $routeSumm.innerHTML =
      `<span style="color:var(--cream)">Charlottesville, VA</span>` +
      `<span style="color:var(--dim)"> → </span>` +
      `<span style="color:var(--cream)">Independence, CA</span>` +
      `<span style="color:var(--dim)"> → </span>` +
      `<span style="color:var(--cream)">Charlottesville, VA</span>`;

    $routeNote.textContent = TRIP_OVERVIEW.note;

    renderStops(TRIP_OVERVIEW.stops);

    const total = allPolylines.reduce((sum, poly) =>
      sum + (poly._pts?.length > 1 ? trackMiles(poly._pts) : 0), 0);
    $distInfo.textContent = total > 0 ? `~${total.toLocaleString()} mi total` : '';

    chips.forEach((el, i) => el.classList.toggle('active', i === 0));
    chips[0]?.scrollIntoView({ inline: 'nearest', block: 'nearest' });

  } else {
    // ── Single day ─────────────────────────────────────────
    const day = DAYS[currentView];

    allPolylines.forEach((poly, i) => {
      const active = i === currentView;
      poly.setStyle({
        color:   active ? '#c8893a' : '#5a3a18',
        weight:  active ? 3.5 : 1.5,
        opacity: active ? 0.92 : 0.35,
      });
      if (active) poly.bringToFront();
    });

    if (fitMap) {
      const pts = allPolylines[currentView]?._pts;
      if (pts?.length) map.fitBounds(L.latLngBounds(pts).pad(0.1));
    }

    $dayCounter.textContent = `DAY ${currentView + 1} OF 7`;

    $dayLabel.textContent = day.label;

    $routeSumm.innerHTML =
      `<span style="color:var(--cream)">${day.from}</span>` +
      `<span style="color:var(--dim)"> → </span>` +
      `<span style="color:var(--cream)">${day.to}</span>`;

    $routeNote.textContent = day.note;

    renderStops(day.stops);

    const pts = allPolylines[currentView]?._pts;
    $distInfo.textContent = pts?.length > 1 ? `~${trackMiles(pts).toLocaleString()} mi` : '';

    // chips[0] = ALL chip, chips[1–7] = days
    chips.forEach((el, i) => el.classList.toggle('active', i === currentView + 1));
    const activeChip = chips[currentView + 1];
    if (activeChip) {
      $dayRow.scrollLeft = activeChip.offsetLeft - ($dayRow.clientWidth / 2) + (activeChip.offsetWidth / 2);
    }
  }
}

/* ── Keyboard ─────────────────────────────────────────────── */

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    selectView(currentView + 1, true);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    selectView(currentView - 1, true);
  } else if (e.key === 'Home') {
    e.preventDefault();
    selectView(-1, true);
  } else if (e.key === 'End') {
    e.preventDefault();
    selectView(DAYS.length - 1, true);
  }
});

document.getElementById('btn-prev').addEventListener('click', () => selectView(currentView - 1, true));
document.getElementById('btn-next').addEventListener('click', () => selectView(currentView + 1, true));

/* ── Boot ─────────────────────────────────────────────────── */

init().catch(err => {
  document.body.innerHTML = `<div style="color:#c8893a;padding:40px;font-family:Georgia;font-size:16px;">
    Failed to load: ${err.message}<br><br>
    Open this file through a local server, e.g.<br>
    <code>python -m http.server 8080</code><br>
    then visit <code>http://localhost:8080</code>
  </div>`;
});
</script>
